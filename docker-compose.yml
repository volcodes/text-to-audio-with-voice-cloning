services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - model-cache:/root/.cache
      - voice-data:/data/voices
    environment:
      - DEVICE=cpu
      - CORS_ORIGINS=http://localhost:5173,http://localhost:80,http://localhost
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  model-cache:
  voice-data:
